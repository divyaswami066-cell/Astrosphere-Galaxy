<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroSphere - Interactive Solar System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* BACKGROUND */
        body {
            background: radial-gradient(ellipse at 30% 20%, rgba(74, 0, 150, 0.3) 0%, rgba(30, 20, 60, 0.4) 25%, rgba(15, 10, 40, 1) 100%);
            position: relative;
            perspective: 1200px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0a28 0%, #1a1038 50%, #0d0620 100%);
            z-index: 0;
        }

        /* STARFIELD */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            opacity: 0.6;
            animation: twinkle 3s infinite;
        }

        .star.blue {
            background: #22d3ee;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* NEBULA LAYER */
        .nebula {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 15% 70%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 20%, rgba(147, 51, 234, 0.08) 0%, transparent 45%);
            pointer-events: none;
            z-index: 2;
            filter: blur(80px);
            animation: driftNebula 25s ease-in-out infinite;
        }

        @keyframes driftNebula {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(40px, 30px); }
        }

        /* MAIN CONTAINER */
        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            perspective: 1500px;
            cursor: grab;
            user-select: none;
        }

        .container.dragging {
            cursor: grabbing;
        }

        /* HEADER / LOGO */
        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 50;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #a855f7;
            position: relative;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #a855f7;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(168, 85, 247, 0.8);
        }

        .logo-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 26px;
            height: 14px;
            border: 1px solid #22d3ee;
            border-radius: 50%;
            transform: translate(-50%, -50%) rotateX(75deg);
            opacity: 0.7;
        }

        .logo-text {
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #a855f7, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        /* SOLAR SYSTEM CONTAINER */
        .solar-system-wrapper {
            position: relative;
            width: 98vw;
            height: 98vh;
            max-width: none;
            max-height: none;
            transform-style: preserve-3d;
            transform: rotateX(15deg) rotateZ(-5deg);
        }

        .solar-system {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-style: preserve-3d;
        }

        /* ORBIT PATHS (elliptical) */
        .orbit-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .orbit {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .orbit.mercury { width: 210px; height: 150px; border-color: rgba(168, 85, 247, 0.3); }
        .orbit.venus { width: 300px; height: 195px; border-color: rgba(147, 51, 234, 0.25); }
        .orbit.earth { width: 420px; height: 255px; border-color: rgba(168, 85, 247, 0.2); }
        .orbit.mars { width: 540px; height: 315px; border-color: rgba(147, 51, 234, 0.15); }
        .orbit.jupiter { width: 780px; height: 450px; border-color: rgba(168, 85, 247, 0.12); }
        .orbit.saturn { width: 1020px; height: 570px; border-color: rgba(147, 51, 234, 0.1); }
        .orbit.uranus { width: 1230px; height: 675px; border-color: rgba(168, 85, 247, 0.08); }
        .orbit.neptune { width: 1440px; height: 780px; border-color: rgba(147, 51, 234, 0.06); }

        /* SUN */
        .sun {
            position: absolute;
            width: 280px;
            height: 280px;
            top: 50%;
            left: 65%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        .sun-body {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 35% 35%, #fff9e6 0%, #ffeb3b 15%, #ffa500 40%, #ff6b00 70%, #ff3d00 100%),
                        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><defs><filter id="turbulence"><feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise" seed="2"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="20"/></filter></defs><circle cx="100" cy="100" r="100" fill="url(%23sunGrad)" filter="url(%23turbulence)"/><defs><radialGradient id="sunGrad"><stop offset="0%25" style="stop-color:rgb(255,250,200);stop-opacity:1"/><stop offset="40%25" style="stop-color:rgb(255,200,0);stop-opacity:1"/><stop offset="80%25" style="stop-color:rgb(255,120,0);stop-opacity:1"/><stop offset="100%25" style="stop-color:rgb(200,50,0);stop-opacity:1"/></radialGradient></defs></svg>') center/cover no-repeat;
            border-radius: 50%;
            box-shadow: 
                0 0 80px rgba(255, 215, 0, 0.8),
                0 0 120px rgba(255, 165, 0, 0.6),
                0 0 160px rgba(255, 100, 0, 0.4),
                inset -30px -30px 60px rgba(0, 0, 0, 0.3),
                inset 20px 20px 40px rgba(255, 255, 255, 0.2);
            animation: sunPulse 4s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .sun-flare {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 200, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            animation: flarePulse 3s ease-in-out infinite;
            box-shadow: 
                0 -120px 0 -80px rgba(255, 200, 0, 0.3),
                0 120px 0 -80px rgba(255, 100, 0, 0.2),
                -120px 0 0 -80px rgba(255, 180, 0, 0.25),
                120px 0 0 -80px rgba(255, 120, 0, 0.25);
        }

        @keyframes sunPulse {
            0%, 100% { box-shadow: 
                0 0 80px rgba(255, 215, 0, 0.8),
                0 0 120px rgba(255, 165, 0, 0.6),
                0 0 160px rgba(255, 100, 0, 0.4),
                inset -30px -30px 60px rgba(0, 0, 0, 0.3),
                inset 20px 20px 40px rgba(255, 255, 255, 0.2); }
            50% { box-shadow: 
                0 0 100px rgba(255, 215, 0, 1),
                0 0 150px rgba(255, 165, 0, 0.8),
                0 0 200px rgba(255, 100, 0, 0.5),
                inset -30px -30px 60px rgba(0, 0, 0, 0.3),
                inset 20px 20px 40px rgba(255, 255, 255, 0.3); }
        }

        @keyframes flarePulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .sun::before {
            content: '';
            position: absolute;
            width: 280px;
            height: 280px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 150, 0, 0.15) 0%, transparent 60%);
            border-radius: 50%;
            animation: coronaGlow 4s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes coronaGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(255, 100, 0, 0.4); }
            50% { box-shadow: 0 0 80px rgba(255, 100, 0, 0.6), 0 0 120px rgba(255, 150, 0, 0.3); }
        }

        /* PLANET WRAPPER */
        .planet-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        /* PLANET */
        .planet {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s ease;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .planet:hover {
            transform: translate(-50%, -50%) scale(1.2);
            filter: brightness(1.2);
        }

        .planet-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #22d3ee;
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.8), 0 0 20px rgba(168, 85, 247, 0.6);
            white-space: nowrap;
            font-weight: bold;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* PLANET TEXTURES */
        .mercury {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at 30% 30%, #e8e8e8, #a0a0a0);
            box-shadow: 0 0 20px rgba(232, 232, 232, 0.5);
        }

        .venus {
            width: 48px;
            height: 48px;
            background: radial-gradient(circle at 35% 35%, #fff8e7, #ffd89b);
            box-shadow: 0 0 25px rgba(255, 216, 155, 0.6);
        }

        .earth {
            width: 54px;
            height: 54px;
            background: radial-gradient(circle at 35% 35%, #4da6ff, #1f5fa8);
            box-shadow: 0 0 30px rgba(77, 166, 255, 0.7);
        }

        .earth::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 65% 60%, rgba(76, 175, 80, 0.6), transparent 60%);
            border-radius: 50%;
        }

        .mars {
            width: 39px;
            height: 39px;
            background: radial-gradient(circle at 30% 30%, #ff9944, #c85a1f);
            box-shadow: 0 0 25px rgba(255, 153, 68, 0.6);
        }

        .jupiter {
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, #d4a574 0%, #c87f2f 40%, #a85c3c 100%);
            box-shadow: 0 0 40px rgba(212, 165, 116, 0.6);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }

        .jupiter::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 18px;
            background: rgba(160, 82, 45, 0.7);
            top: 40%;
        }

        .jupiter::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 12px;
            background: rgba(140, 70, 35, 0.5);
            top: 65%;
        }

        .saturn {
            width: 84px;
            height: 84px;
            background: radial-gradient(circle at 35% 35%, #f5d547, #d4a851);
            box-shadow: 0 0 35px rgba(245, 213, 71, 0.6);
            border-radius: 50%;
        }

        .saturn-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(70deg);
            width: 135px;
            height: 42px;
            border: 4px solid rgba(168, 85, 247, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .uranus {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 35% 35%, #4fb3e8, #2c7fa3);
            box-shadow: 0 0 30px rgba(79, 179, 232, 0.6);
        }

        .neptune {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 35% 35%, #4a7bff, #1f3d76);
            box-shadow: 0 0 30px rgba(74, 123, 255, 0.6);
        }

        /* ANIMATIONS */
        @keyframes orbitPath {
            0% { offset-position: 0%;  }
            100% { offset-position: 100%; }
        }

        .planet-orbit {
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        .mercury { animation-name: orbitMercury; animation-duration: 12s; }
        .venus { animation-name: orbitVenus; animation-duration: 18s; }
        .earth { animation-name: orbitEarth; animation-duration: 25s; }
        .mars { animation-name: orbitMars; animation-duration: 32s; }
        .jupiter { animation-name: orbitJupiter; animation-duration: 45s; }
        .saturn { animation-name: orbitSaturn; animation-duration: 55s; }
        .uranus { animation-name: orbitUranus; animation-duration: 65s; }
        .neptune { animation-name: orbitNeptune; animation-duration: 75s; }

        @keyframes orbitMercury {
            0% { transform: translate(-50%, -50%) rotateZ(0deg) translateX(105px); }
            100% { transform: translate(-50%, -50%) rotateZ(360deg) translateX(105px); }
        }

        @keyframes orbitVenus {
            0% { transform: translate(-50%, -50%) rotateZ(0deg) translateX(150px); }
            100% { transform: translate(-50%, -50%) rotateZ(360deg) translateX(150px); }
        }

        @keyframes orbitEarth {
            0% { transform: translate(-50%, -50%) rotateZ(0deg) translateX(210px); }
            100% { transform: translate(-50%, -50%) rotateZ(360deg) translateX(210px); }
        }

        @keyframes orbitMars {
            0% { transform: translate(-50%, -50%) rotateZ(0deg) translateX(270px); }
            100% { transform: translate(-50%, -50%) rotateZ(360deg) translateX(270px); }
        }

        @keyframes orbitJupiter {
            0% { transform: translate(-50%, -50%) rotateZ(0deg) translateX(390px); }
            100% { transform: translate(-50%, -50%) rotateZ(360deg) translateX(390px); }
        }

        @keyframes orbitSaturn {
            0% { transform: translate(-50%, -50%) rotateZ(0deg) translateX(510px); }
            100% { transform: translate(-50%, -50%) rotateZ(360deg) translateX(510px); }
        }

        @keyframes orbitUranus {
            0% { transform: translate(-50%, -50%) rotateZ(0deg) translateX(615px); }
            100% { transform: translate(-50%, -50%) rotateZ(360deg) translateX(615px); }
        }

        @keyframes orbitNeptune {
            0% { transform: translate(-50%, -50%) rotateZ(0deg) translateX(720px); }
            100% { transform: translate(-50%, -50%) rotateZ(360deg) translateX(720px); }
        }

        /* CONTROLS */
        .controls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 50;
        }

        .btn-add-planet {
            padding: 12px 24px;
            background: rgba(168, 85, 247, 0.1);
            border: 2px solid #a855f7;
            border-radius: 50px;
            color: #a855f7;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        .btn-add-planet:hover {
            background: rgba(168, 85, 247, 0.2);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
            transform: scale(1.05);
        }

        /* INFO MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            animation: fadeInBackdrop 0.3s ease;
        }

        @keyframes fadeInBackdrop {
            from { opacity: 0; backdrop-filter: blur(0px); }
            to { opacity: 1; backdrop-filter: blur(5px); }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 20, 60, 0.7);
            border: 2px solid #a855f7;
            border-radius: 20px;
            padding: 30px;
            max-width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.05);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: scale(0.8) translateY(-20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: none;
            border: none;
            color: #a855f7;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            transform: rotate(90deg);
            color: #22d3ee;
        }

        .modal h2 {
            color: #a855f7;
            font-size: 24px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .modal-info-item {
            color: #e0e0e0;
            margin-bottom: 12px;
            font-size: 13px;
            line-height: 1.6;
        }

        .modal-info-label {
            color: #22d3ee;
            font-weight: bold;
            margin-right: 8px;
        }

        .modal-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #a855f7, transparent);
            margin: 20px 0;
        }

        .modal-fact {
            color: #22d3ee;
            font-size: 12px;
            font-style: italic;
            line-height: 1.8;
            padding: 15px;
            background: rgba(168, 85, 247, 0.1);
            border-left: 3px solid #22d3ee;
            border-radius: 5px;
        }

        /* FORM MODAL */
        .form-modal {
            display: none;
        }

        .form-modal.active {
            display: flex;
        }

        .form-content {
            background: rgba(30, 20, 60, 0.7);
            border: 2px solid #22d3ee;
            border-radius: 20px;
            padding: 30px;
            max-width: 350px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .form-content h2 {
            color: #22d3ee;
            font-size: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            color: #a855f7;
            font-size: 12px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid #a855f7;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            background: rgba(168, 85, 247, 0.15);
            border-color: #22d3ee;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
        }

        .form-group input::placeholder {
            color: rgba(224, 224, 224, 0.4);
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-submit,
        .btn-cancel {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-submit {
            background: #a855f7;
            color: white;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .btn-submit:hover {
            background: #c084fc;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
        }

        .btn-cancel {
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
            border: 1px solid #a855f7;
        }

        .btn-cancel:hover {
            background: rgba(168, 85, 247, 0.2);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }

        .color-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-input-wrapper input[type="color"] {
            width: 50px;
            height: 35px;
            padding: 2px;
            cursor: pointer;
        }

        .color-input-wrapper input[type="text"] {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="starfield" id="starfield"></div>
    <div class="nebula"></div>

    <div class="container">
        <div class="header">
            <div class="logo-icon">
                <div class="logo-ring"></div>
            </div>
            <div class="logo-text">AstroSphere</div>
        </div>

        <div class="solar-system-wrapper">
            <div class="orbit-container">
                <div class="orbit mercury"></div>
                <div class="orbit venus"></div>
                <div class="orbit earth"></div>
                <div class="orbit mars"></div>
                <div class="orbit jupiter"></div>
                <div class="orbit saturn"></div>
                <div class="orbit uranus"></div>
                <div class="orbit neptune"></div>
            </div>

            <div class="solar-system">
                <div class="sun">
                    <div class="sun-body">
                        <div class="sun-flare"></div>
                    </div>
                </div>

                <div class="planet-wrapper" id="planetsContainer"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-add-planet" id="btnAddPlanet">+ Add Planet</button>
        </div>
    </div>

    <!-- INFO MODAL -->
    <div class="modal" id="infoModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">×</button>
            <h2 id="modalTitle">Mercury</h2>
            <div class="modal-info-item">
                <span class="modal-info-label">Type:</span>
                <span id="modalType">Terrestrial</span>
            </div>
            <div class="modal-info-item">
                <span class="modal-info-label">Distance:</span>
                <span id="modalDistance">58 million km</span>
            </div>
            <div class="modal-info-item">
                <span class="modal-info-label">Diameter:</span>
                <span id="modalSize">4,880 km</span>
            </div>
            <div class="modal-info-item">
                <span class="modal-info-label">Temperature:</span>
                <span id="modalTemp">-180°C to 430°C</span>
            </div>
            <div class="modal-info-item">
                <span class="modal-info-label">Orbital Period:</span>
                <span id="modalOrbit">88 days</span>
            </div>
            <div class="modal-divider"></div>
            <div class="modal-fact" id="modalFact">Mercury is the fastest planet in our solar system.</div>
        </div>
    </div>

    <!-- ADD PLANET FORM -->
    <div class="form-modal" id="formModal">
        <div class="form-content">
            <button class="modal-close" id="formClose">×</button>
            <h2>Create Planet</h2>
            <form id="addPlanetForm">
                <div class="form-group">
                    <label for="planetName">Planet Name</label>
                    <input type="text" id="planetName" placeholder="Enter name" required>
                </div>
                <div class="form-group">
                    <label for="planetColor">Color (Hex)</label>
                    <div class="color-input-wrapper">
                        <input type="color" id="planetColor" value="#a855f7">
                        <input type="text" id="colorHex" value="#a855f7" readonly>
                    </div>
                </div>
                <div class="form-group">
                    <label for="planetSize">Size (px)</label>
                    <input type="number" id="planetSize" min="16" max="80" value="32" required>
                </div>
                <div class="form-group">
                    <label for="orbitDistance">Orbit Distance (px)</label>
                    <input type="number" id="orbitDistance" min="80" max="500" value="200" required>
                </div>
                <div class="form-group">
                    <label for="orbitSpeed">Speed (seconds)</label>
                    <input type="number" id="orbitSpeed" min="8" max="80" step="4" value="30" required>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn-submit">Create</button>
                    <button type="button" class="btn-cancel" id="formCancelBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // PLANET DATA
        const planetsData = [
            {
                name: 'Mercury',
                size: 20,
                distance: 70,
                speed: 12,
                className: 'mercury',
                type: 'Terrestrial',
                size_label: '4,880 km',
                distance_label: '58 million km',
                temp: '-180°C to 430°C',
                orbit: '88 days',
                fact: 'Mercury is the fastest planet in our solar system and has extreme temperature swings.'
            },
            {
                name: 'Venus',
                size: 32,
                distance: 100,
                speed: 18,
                className: 'venus',
                type: 'Terrestrial',
                size_label: '12,104 km',
                distance_label: '108 million km',
                temp: '464°C',
                orbit: '225 days',
                fact: 'Venus spins backward compared to most planets and is hotter than Mercury despite being further from the sun.'
            },
            {
                name: 'Earth',
                size: 36,
                distance: 140,
                speed: 25,
                className: 'earth',
                type: 'Terrestrial',
                size_label: '12,742 km',
                distance_label: '150 million km',
                temp: '15°C (average)',
                orbit: '365 days',
                fact: 'Earth is the only planet known to support life and has a perfect distance from the sun.'
            },
            {
                name: 'Mars',
                size: 26,
                distance: 180,
                speed: 32,
                className: 'mars',
                type: 'Terrestrial',
                size_label: '6,779 km',
                distance_label: '228 million km',
                temp: '-65°C (average)',
                orbit: '687 days',
                fact: 'Mars has the tallest volcano in the solar system and shows evidence of ancient water.'
            },
            {
                name: 'Jupiter',
                size: 64,
                distance: 260,
                speed: 45,
                className: 'jupiter',
                type: 'Gas Giant',
                size_label: '139,820 km',
                distance_label: '778 million km',
                temp: '-110°C',
                orbit: '12 years',
                fact: 'Jupiter is so large it could fit 1,300 Earths inside and has a Great Red Spot that is larger than Earth.'
            },
            {
                name: 'Saturn',
                size: 56,
                distance: 340,
                speed: 55,
                className: 'saturn',
                type: 'Gas Giant',
                size_label: '116,460 km',
                distance_label: '1.4 billion km',
                temp: '-140°C',
                orbit: '29 years',
                fact: 'Saturn appears flat because of its wide rings and is less dense than water.',
                rings: true
            },
            {
                name: 'Uranus',
                size: 40,
                distance: 410,
                speed: 65,
                className: 'uranus',
                type: 'Ice Giant',
                size_label: '50,724 km',
                distance_label: '2.9 billion km',
                temp: '-195°C',
                orbit: '84 years',
                fact: 'Uranus rolls on its side as it travels around the sun due to its extreme axial tilt.'
            },
            {
                name: 'Neptune',
                size: 40,
                distance: 480,
                speed: 75,
                className: 'neptune',
                type: 'Ice Giant',
                size_label: '49,244 km',
                distance_label: '4.5 billion km',
                temp: '-200°C',
                orbit: '165 years',
                fact: 'Neptune has the strongest winds in the solar system and was discovered through mathematical calculations.'
            }
        ];

        let customPlanets = [];

        // STARFIELD GENERATION
        function generateStarfield() {
            const starfield = document.getElementById('starfield');
            for (let i = 0; i < 250; i++) {
                const star = document.createElement('div');
                star.className = 'star' + (Math.random() > 0.85 ? ' blue' : '');
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (Math.random() * 2 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                starfield.appendChild(star);
            }
        }

        // CREATE PLANET ELEMENT
        function createPlanetElement(planet) {
            const planetEl = document.createElement('div');
            planetEl.className = `planet planet-orbit ${planet.className || 'custom'}`;
            planetEl.style.width = planet.size + 'px';
            planetEl.style.height = planet.size + 'px';
            
            if (!planet.className) {
                planetEl.style.background = planet.color;
                planetEl.style.boxShadow = `0 0 ${planet.size}px ${planet.color}`;
            }
            
            planetEl.style.animationDuration = planet.speed + 's';
            planetEl.style.setProperty('--orbit-distance', planet.distance + 'px');

            const label = document.createElement('div');
            label.className = 'planet-label';
            label.textContent = planet.name;
            planetEl.appendChild(label);

            if (planet.rings) {
                const ring = document.createElement('div');
                ring.className = 'saturn-ring';
                planetEl.appendChild(ring);
            }

            planetEl.addEventListener('click', () => showPlanetInfo(planet));
            
            return planetEl;
        }

        // SHOW PLANET INFO
        function showPlanetInfo(planet) {
            document.getElementById('modalTitle').textContent = planet.name;
            document.getElementById('modalType').textContent = planet.type || 'Unknown';
            document.getElementById('modalDistance').textContent = planet.distance_label;
            document.getElementById('modalSize').textContent = planet.size_label;
            document.getElementById('modalTemp').textContent = planet.temp || 'N/A';
            document.getElementById('modalOrbit').textContent = planet.orbit || 'N/A';
            document.getElementById('modalFact').textContent = planet.fact;
            document.getElementById('infoModal').classList.add('active');
        }

        // CLOSE MODALS
        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('infoModal').classList.remove('active');
        });

        document.getElementById('infoModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('infoModal')) {
                document.getElementById('infoModal').classList.remove('active');
            }
        });

        document.getElementById('btnAddPlanet').addEventListener('click', () => {
            document.getElementById('formModal').classList.add('active');
        });

        document.getElementById('formClose').addEventListener('click', () => {
            document.getElementById('formModal').classList.remove('active');
        });

        document.getElementById('formCancelBtn').addEventListener('click', () => {
            document.getElementById('formModal').classList.remove('active');
        });

        document.getElementById('formModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('formModal')) {
                document.getElementById('formModal').classList.remove('active');
            }
        });

        // COLOR PICKER
        document.getElementById('planetColor').addEventListener('change', (e) => {
            document.getElementById('colorHex').value = e.target.value;
        });

        // ADD PLANET FORM
        document.getElementById('addPlanetForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('planetName').value.trim();
            const color = document.getElementById('planetColor').value;
            const size = parseInt(document.getElementById('planetSize').value);
            const distance = parseInt(document.getElementById('orbitDistance').value);
            const speed = parseInt(document.getElementById('orbitSpeed').value);

            const newPlanet = {
                name,
                size,
                distance,
                speed,
                color,
                type: 'Custom Planet',
                size_label: (size * 500) + ' km',
                distance_label: (distance * 5) + ' million km',
                temp: 'Unknown',
                orbit: 'Unknown',
                fact: 'A custom planet born from your imagination.',
                custom: true
            };

            customPlanets.push(newPlanet);
            const planetEl = createPlanetElement(newPlanet);
            document.getElementById('planetsContainer').appendChild(planetEl);

            document.getElementById('addPlanetForm').reset();
            document.getElementById('planetColor').value = '#a855f7';
            document.getElementById('colorHex').value = '#a855f7';
            document.getElementById('formModal').classList.remove('active');
        });

        // INITIALIZE
        function init() {
            generateStarfield();

            const container = document.getElementById('planetsContainer');
            planetsData.forEach(planet => {
                const planetEl = createPlanetElement(planet);
                container.appendChild(planetEl);
            });
        }

        // DRAG/PAN FUNCTIONALITY
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let offsetX = 0;
        let offsetY = 0;
        let lastX = 0;
        let lastY = 0;

        const containerEl = document.querySelector('.solar-system-wrapper');
        const mainContainer = document.querySelector('.container');

        mainContainer.addEventListener('mousedown', (e) => {
            // Prevent dragging if clicking on modals or buttons
            if (e.target.closest('.modal-content') || e.target.closest('button') || e.target.closest('input')) {
                return;
            }
            isDragging = true;
            startX = e.clientX - offsetX;
            startY = e.clientY - offsetY;
            mainContainer.classList.add('dragging');
            mainContainer.style.cursor = 'grabbing';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            offsetX = e.clientX - startX;
            offsetY = e.clientY - startY;
            containerEl.style.transform = `rotateX(15deg) rotateZ(-5deg) translate(${offsetX}px, ${offsetY}px)`;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            mainContainer.classList.remove('dragging');
            mainContainer.style.cursor = 'grab';
        });

        init();
    </script>
</body>
</html>
